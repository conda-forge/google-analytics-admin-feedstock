schema_version: 1

context:
  name: google-analytics-admin
  version: "0.28.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/google_analytics_admin-${{ version }}.tar.gz
  sha256: 83dc10abb0527bbc5d520a138966acfda62b3e99f9611c3af07bd057bb6a79c3

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - google-api-core >=2.11.0,<3.0.0
    - google-api-core-grpc
    - google-auth >=2.14.1,<3.0.0,!=2.24.0,!=2.25.0
    # more restrictive constraint for python 3.14
    - grpcio >=1.75.1,<2.0.0
    # more restrictive constraint for python 3.13
    - proto-plus >=1.25.0,<2.0.0
    - protobuf >=4.25.8,<8.0.0

tests:
  - python:
      imports:
        - google.analytics.admin
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - python ${{ python_min }}.*
        - pip
    script:
      - pip check

about:
  summary: Google Analytics Admin API client library
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/googleapis/google-cloud-python/tree/main/packages/google-analytics-admin
  repository: https://github.com/googleapis/google-cloud-python/tree/main/packages/google-analytics-admin
  documentation: https://googleapis.dev/python/analyticsadmin/latest/

extra:
  recipe-maintainers:
    - xylar
